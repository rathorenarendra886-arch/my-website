<!DOCTYPE html>
<html>
<head>
  <title>My Shop</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }
    h1 {
      background: black;
      color: white;
      padding: 15px;
    }
    .product {
      background: white;
      padding: 15px;
      margin: 15px;
      display: inline-block;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }
    button {
      background: green;
      color: white;
      padding: 10px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>My Online Store</h1>

<div class="product">
  <h2>Mobile</h2>
  <p>₹10,000</p>
  <button>Buy Now</button>
</div>

<div class="product">
  <h2>Headphones</h2>
  <p>₹1,000</p>
  <button>Buy Now</button>
</div>

<div class="product">
  <h2>Shoes</h2>
  <p>₹2,000</p>
  <button>Buy Now</button>
</div>

</body>
</html>
