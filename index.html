<!DOCTYPE html>
<html>
<head>
  <title>My Premium Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
    }

    .container {
      padding: 50px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      opacity: 0.9;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: white;
      color: #333;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ffcc00;
      color: black;
    }

    .card {
      background: white;
      color: black;
      margin: 30px auto;
      padding: 20px;
      border-radius: 15px;
      width: 80%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🚀 Welcome to My Website</h1>
    <p>Yeh ek premium style website hai 🔥</p>

    <a href="#" class="btn">Get Started</a>

    <div class="card">
      <h2>About Me</h2>
      <p>Main ek beginner hoon aur website banana seekh raha/rahi hoon 😎</p>
    </div>

    <div class="card">
      <h2>Contact</h2>
      <p>Email: example@gmail.com</p>
    </div>

  </div>

</body>
</html>
